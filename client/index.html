<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bluetick — WhatsApp Business API Platform | CRM, Automation & Bulk Messaging</title>

    <!-- ── Primary SEO ──────────────────────────────────────────────────────── -->
    <meta name="description" content="Bluetick is a powerful WhatsApp Business API platform. Send bulk broadcasts, launch native online stores, create premium digital vCards, and deploy AI chatbots." />
    <meta name="keywords" content="WhatsApp Business API, WhatsApp CRM, WhatsApp bulk messaging, WhatsApp automation, WhatsApp chatbot, CTWA ads, WhatsApp broadcast, shared WhatsApp inbox, online store, digital vcard, Bluetick" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://bluetick.cloud/" />

    <!-- ── Open Graph (Facebook / LinkedIn) ────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bluetick.cloud/" />
    <meta property="og:title" content="Bluetick — WhatsApp Business API Platform" />
    <meta property="og:description" content="Bluetick is a powerful WhatsApp Business API platform. Send bulk broadcasts, launch native online stores, create premium digital vCards, and deploy AI chatbots." />
    <meta property="og:image" content="https://bluetick.cloud/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Bluetick" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter / X Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://bluetick.cloud/" />
    <meta name="twitter:title" content="Bluetick — WhatsApp Business API Platform" />
    <meta name="twitter:description" content="Bluetick is a powerful WhatsApp Business API platform. Send bulk broadcasts, launch native online stores, create premium digital vCards, and deploy AI chatbots." />
    <meta name="twitter:image" content="https://bluetick.cloud/og-image.png" />

    <!-- Preconnect to API and CDN origins so DNS+TLS is ready before first request -->
    <link rel="preconnect" href="https://api.bluetick.cloud" crossorigin>
    <link rel="dns-prefetch" href="https://api.bluetick.cloud">
    <link rel="preconnect" href="https://cdn.bluetick.cloud" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.bluetick.cloud">

    <!--
      GOOGLE FONTS — Non-render-blocking via preload + media swap.
      Preconnects removed: Lighthouse flags them as unused when fonts load asynchronously.
      The async load below still works without the preconnects (browser discovers the
      fonts.gstatic.com connection lazily when the stylesheet is parsed).
    -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600&family=Nunito:wght@400;600;700;900&family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Quicksand:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&family=Teko:wght@400;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600&family=Nunito:wght@400;600;700;900&family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Quicksand:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&family=Teko:wght@400;600;700&display=swap"></noscript>

    <!-- Razorpay SDK loaded dynamically only on Checkout/Payment pages -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
