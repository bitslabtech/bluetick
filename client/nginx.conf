server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Vite Hashed Assets — 1 year immutable cache ───────────────────────────
    # Vite appends content hashes to filenames (e.g. index-D_5H0q7x.js)
    # Safe to cache forever because filenames change when content changes
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Public Static Files — short cache ────────────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff2|woff|ttf)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── SPA Fallback — serve index.html for all routes ───────────────────────
    # Required for React Router: refreshing /dashboard must return index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache";
    }
}
